name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC — catches newly-disclosed advisories

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: npm ci
      # Production dependency audit — fails on high or critical vulnerabilities
      # in runtime dependencies (excludes devDependencies).
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      # TODO: tighten dev-dep audit to --audit-level=high once the existing
      # 23 high-severity dev vulnerabilities (all in devDependencies like
      # electron-forge, vite, playwright tooling) are resolved. Tracking
      # separately. For now, only block CI on critical dev vulnerabilities.
      - name: Dev dependency audit (critical only)
        run: npm audit --audit-level=critical

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run rebuild:electron
      - run: xvfb-run npx playwright test
        env:
          ELECTRON_DISABLE_SANDBOX: 1