name: Build and Sign

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install native deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Rebuild better-sqlite3 for Electron
        run: npm run rebuild:electron

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build application (unsigned on PR)
        env:
          NODE_ENV: production
        run: npm run make

      - name: Sign and notarize (Windows)
        if: runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PATH: ${{ github.workspace }}\certificate.pfx
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "No WINDOWS_CERTIFICATE_BASE64 secret found. Skipping Windows signing."
            exit 0
          }
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          [IO.File]::WriteAllBytes($env:WINDOWS_CERTIFICATE_PATH, $bytes)
          npm run make

      - name: Sign and notarize (macOS)
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          OSX_ENTITLEMENTS: ${{ github.workspace }}/entitlements.plist
        run: |
          if [ -z "$CSC_LINK" ] || [ -z "$CSC_KEY_PASSWORD" ]; then
            echo "No CSC_LINK / CSC_KEY_PASSWORD secrets found. Skipping macOS signing."
            exit 0
          fi
          npm run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legalvu-${{ matrix.os }}
          path: |
            out/make/**/*
            out/**/*.exe
            out/**/*.dmg
            out/**/*.zip
          if-no-files-found: ignore

  verify:
    name: Verify signatures
    needs: build
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Download Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v4
        with:
          name: legalvu-windows-latest
          path: ./out

      - name: Verify Windows signature
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_BASE64
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          $exe = Get-ChildItem -Path ./out -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No .exe found" }
          signtool verify /pa "$exe.FullName"

      - name: Download macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/download-artifact@v4
        with:
          name: legalvu-macos-latest
          path: ./out

      - name: Verify macOS signature
        if: runner.os == 'macOS' && env.CSC_LINK
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          dmg=$(find ./out -name "*.dmg" | head -n 1)
          if [ -z "$dmg" ]; then echo "No .dmg found"; exit 0; fi
          spctl -a -t open --context context:primary-signature -v "$dmg"
